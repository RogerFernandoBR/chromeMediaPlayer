<h2>Editor de Imagens</h2>
<div class="image-container">
    <div class="canvas-wrapper">
        <div class="tools-container">
            <div class="tool-bar">
            <app-square-button *ngFor="let tool of toolsButtons" [squareButtonObj]="tool" (buttonClicked)="onButtonClicked()"></app-square-button>
            
            <div class="resize-inputs-group">
                <app-input [inputObj]="inputWidthObj"></app-input>
                
                <lucide-icon 
                    [name]="keepAspect ? 'link-2' : 'link-2-off'" 
                    class="aspect" 
                    size="14"
                    (click)="keepAspect = !keepAspect" 
                    [attr.aria-label]="keepAspect ? 'Remover proporção' : 'Manter proporção'"
                    [matTooltip]="keepAspect ? 'Remover proporção' : 'Manter proporção'">
                </lucide-icon>
                <!-- Checkbox oculto, só para manter compatibilidade -->
                <input type="checkbox" id="keepAspect" [checked]="keepAspect" hidden />
        
                <app-input [inputObj]="inputHeightObj"></app-input>
            </div>
            
            <div class="download-button-wrapper" [class.disabled]="!imageLoaded">
                <button class="download-btn" [disabled]="!imageLoaded" (click)="toggleDownloadMenu()" matTooltip="Baixar imagem">
                    <lucide-icon name="Download" class="download-icon" aria-label="Baixar imagem"></lucide-icon>
                </button>
                <div class="download-menu" *ngIf="showDownloadMenu && imageLoaded">
                    <button class="download-option" (click)="downloadImage('image/png')">PNG</button>
                    <button class="download-option" (click)="downloadImage('image/jpeg')">JPG</button>
                    <button class="download-option" (click)="downloadImage('image/webp')">WebP</button>
                </div>
            </div>
        </div>
        </div>
        <div class="canvas-container">
            <canvas id="canvas" [class.dashed-border]="showUpload"></canvas>
            <app-upload 
                *ngIf="showUpload"
                class="upload-overlay"
                [uploadObj]="uploadObj" 
                (click)="triggerUpload()" 
                (dragover)="onDragOver($event)" 
                (drop)="onDrop($event)">
            </app-upload>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" />
        </div>
    </div>
</div>

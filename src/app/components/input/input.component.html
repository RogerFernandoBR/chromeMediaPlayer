<div class="input-wrapper">
    <label *ngIf="inputObj.label" [for]="inputObj.id">{{ inputObj.label }}</label>
    <input 
        [type]="inputObj.type" 
        [id]="inputObj.id ?? ''" 
        (change)="onChange()"
        [disabled]="inputObj.disabled ?? false"
        [placeholder]="inputObj.label || ''">
</div>
